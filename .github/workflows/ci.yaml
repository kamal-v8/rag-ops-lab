name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
            python -m pip install --upgrade pip
            pip install ruff
            pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
            ruff check backend/ --select=E9,F63,F7,F82 --output-format=github
            ruff check backend/

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend
        continue-on-error: true

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend


  docker-build-test:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
     - uses: actions/checkout@v4

     - name: Verify Docker Compose Build
       run: docker compose -f docker-compose.yaml build
